# Nginx — serve the React frontend static files, proxy /api and /ws to FastAPI.
# Large file uploads (knowledge base, CSV imports) get a generous body cap.

server {
    listen 80;
    server_name _;

    client_max_body_size 60M;

    # ── Frontend static files ────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # long-running agent loops
        proxy_send_timeout 300s;
    }

    # WebSocket for streaming chat
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback — anything else returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
