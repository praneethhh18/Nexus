# NexusAgent — production compose stack
#
# Brings up:
#   api           — FastAPI backend on :8000 (internal) — pulled from GHCR
#   proxy         — nginx: frontend static + /api + HTTPS via Let's Encrypt
#   certbot       — auto-renews Let's Encrypt certs every 12 h
#   vox-server    — nexuscaller-lab FastAPI server on :8765 (internal)
#   vox-worker    — LiveKit agent worker (outbound call handler)
#   bridge        — WhatsApp Baileys bridge (profile: bridge)
#   backup        — nightly SQLite snapshot (profile: backup)
#   postgres      — optional Postgres (profile: postgres)
#
# First-time HTTPS setup (run once after DNS is pointing here):
#   ./deploy/init-letsencrypt.sh <base-domain> <email>
#
# Usage:
#   docker compose up -d                              # SQLite, core services
#   docker compose --profile postgres up -d           # with Postgres
#   docker compose --profile bridge up -d             # with WhatsApp bridge
#   docker compose --profile backup up -d             # with nightly backup

services:
  api:
    image: ghcr.io/praneethhh18/nexus:latest
    container_name: nexus_api
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./chroma_db:/app/chroma_db
      - ./backups:/app/backups
      - ./.env:/app/.env:ro
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LAB_URL=http://vox-server:8765
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  proxy:
    image: nginx:alpine
    container_name: nexus_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./landing/dist:/usr/share/nginx/landing:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: nexus_certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  bridge:
    image: node:20-slim
    container_name: nexus_whatsapp_bridge
    working_dir: /bridge
    volumes:
      - ./whatsapp_bridge:/bridge
    command: sh -c "npm install && npm start"
    environment:
      - NEXUS_API_URL=http://api:8000
    env_file:
      - ./whatsapp_bridge/.env
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["bridge"]

  backup:
    image: ghcr.io/praneethhh18/nexus:latest
    container_name: nexus_backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update && apt-get install -y cron >/dev/null 2>&1
        echo "0 3 * * * cd /app && python tools/backup_db.py >> /app/backups/cron.log 2>&1" > /etc/cron.d/nexus
        chmod 0644 /etc/cron.d/nexus
        crontab /etc/cron.d/nexus
        cron
        tail -f /app/backups/cron.log 2>/dev/null || tail -f /dev/null
    volumes:
      - ./data:/app/data:ro
      - ./backups:/app/backups
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["backup"]

  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    environment:
      POSTGRES_DB: nexusagent
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["postgres"]

  vox-server:
    image: ghcr.io/praneethhh18/nexuscaller-lab:latest
    container_name: nexus_vox_server
    expose:
      - "8765"
    volumes:
      - vox_transcripts:/app/voice_agent/transcripts
      - ../nexuscaller-lab/.env:/app/.env:ro
    environment:
      - LOCAL_OSS_PREWARM=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  vox-worker:
    image: ghcr.io/praneethhh18/nexuscaller-lab:latest
    container_name: nexus_vox_worker
    command: ["python", "-m", "voice_agent.agent", "start"]
    volumes:
      - vox_transcripts:/app/voice_agent/transcripts
      - vox_models:/root/.cache
      - ../nexuscaller-lab/.env:/app/.env:ro
    environment:
      - LOCAL_OSS_PREWARM=0
    restart: unless-stopped

volumes:
  postgres_data:
  vox_transcripts:
  vox_models:
