# NexusAgent — production-ish compose stack
#
# Brings up:
#   api           — FastAPI backend on :8000 (internal)
#   proxy         — nginx serving frontend static + reverse-proxying /api → api
#   bridge        — WhatsApp Baileys bridge (optional; comment out if unused)
#   backup        — cron container that snapshots the SQLite DB nightly
#   postgres      — optional, only enabled when using the postgres profile
#
# Usage:
#   Default (SQLite, no Postgres):
#     docker compose up -d
#
#   With Postgres:
#     docker compose --profile postgres up -d
#     # then in .env set DATABASE_URL=postgresql://nexus:nexus@postgres:5432/nexusagent
#     # and run: docker compose exec api python tools/migrate_to_postgres.py
#
# The Ollama service is NOT bundled — run it on the host (default) or in a
# separate container (GPU pass-through is host-specific).

services:
  api:
    build: .
    image: nexusagent/api:latest
    container_name: nexus_api
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./chroma_db:/app/chroma_db
      - ./backups:/app/backups
      - ./.env:/app/.env:ro
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  proxy:
    image: nginx:alpine
    container_name: nexus_proxy
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  bridge:
    image: node:20-slim
    container_name: nexus_whatsapp_bridge
    working_dir: /bridge
    volumes:
      - ./whatsapp_bridge:/bridge
    command: sh -c "npm install && npm start"
    environment:
      - NEXUS_API_URL=http://api:8000
    env_file:
      - ./whatsapp_bridge/.env
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["bridge"]  # enable with: docker compose --profile bridge up -d

  backup:
    image: nexusagent/api:latest
    container_name: nexus_backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Simple cron loop. Runs backup_db.py daily at 03:00 UTC.
        apt-get update && apt-get install -y cron >/dev/null 2>&1
        echo "0 3 * * * cd /app && python tools/backup_db.py >> /app/backups/cron.log 2>&1" > /etc/cron.d/nexus
        chmod 0644 /etc/cron.d/nexus
        crontab /etc/cron.d/nexus
        cron
        tail -f /app/backups/cron.log 2>/dev/null || tail -f /dev/null
    volumes:
      - ./data:/app/data:ro
      - ./backups:/app/backups
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["backup"]

  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    environment:
      POSTGRES_DB: nexusagent
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["postgres"]

volumes:
  postgres_data:
