# Dependabot — security-only mode.
#
# Routine version bumps (lucide-react 1.11→1.14, etc.) are intentionally
# disabled by setting `open-pull-requests-limit: 0` on every ecosystem.
# That stops the weekly noise while we're solo + pre-launch.
#
# What still happens automatically:
#   - **Security updates**: when GitHub's vulnerability DB flags one of our
#     deps with a known CVE, Dependabot opens a PR. These are handled by the
#     repo's "Dependabot security updates" toggle (Settings → Code security),
#     NOT by this file. They ignore the limit-0 setting.
#
# When the project starts having paying customers OR a teammate joins, flip
# `open-pull-requests-limit` back to 5 (or whatever) per ecosystem to resume
# routine hygiene.

version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 0   # security-only; routine bumps disabled

  - package-ecosystem: npm
    directory: "/frontend"
    schedule: { interval: weekly }
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: "/landing"
    schedule: { interval: weekly }
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: "/whatsapp_bridge"
    schedule: { interval: weekly }
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: "/desktop"
    schedule: { interval: weekly }
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 0
