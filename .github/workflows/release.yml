name: Release

# Triggers:
#   - tag push matching v*.*.*  → real release
#   - workflow_dispatch         → on-demand release for testing
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version tag (e.g. v0.3.0)"
        required: true
        default: "v0.0.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build a multi-arch Docker image, scan it for known CVEs, then push to
  # GHCR. Failing the scan blocks the push — we'd rather catch a critical
  # CVE before customers pull a vulnerable image than after.
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Build, scan, push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # Trivy uploads SARIF results to the Security tab
    steps:
      - uses: actions/checkout@v5

      - name: Derive version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (load locally for scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          # Single-arch build first; we load it into the local Docker so
          # Trivy can inspect it. The multi-arch push happens below after
          # the scan passes.
          platforms: linux/amd64
          load: true
          tags: nexusagent:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: nexusagent:scan
          format: sarif
          output: trivy-results.sarif
          # Don't fail on LOW/MEDIUM — those are noise. Block CRITICAL
          # so a known-bad base image can't slip through.
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Draft a GitHub release with auto-generated notes from the commit history
  # since the previous tag. Marked as a draft so the maintainer reviews
  # before publishing — releases trigger downstream notifications.
  # ─────────────────────────────────────────────────────────────────────────
  github-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
